<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AWCSO 2026 — Video Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
:root{
  --bg:#0e0f11;--surface:#16181c;--surface2:#1e2128;--surface3:#22252e;
  --border:#2a2d35;--border2:#363a45;
  --text:#e8eaf0;--text2:#8b8f9e;--text3:#565a6a;
  --accent:#c8f06e;--accent2:#8fd44a;
  --red:#f06e6e;--teal:#6ec8c8;--amber:#f0c46e;--purple:#a46ef0;--blue:#6ea8f0;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
.app{max-width:560px;margin:0 auto;padding:0 0 80px}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border:0.5px solid var(--border2);border-radius:16px;padding:26px 22px;width:340px;text-align:center;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:500;margin-bottom:4px}
.modal p{font-size:12px;color:var(--text3);margin-bottom:18px}
.modal-step{display:none}.modal-step.active{display:block}
.modal-skip{font-size:12px;color:var(--text3);cursor:pointer;margin-top:10px;display:inline-block;transition:color 0.15s}
.modal-skip:hover{color:var(--text2)}

/* Role cards */
.role-picker{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.role-card{border:0.5px solid var(--border2);border-radius:var(--rl);padding:14px 10px;cursor:pointer;transition:all 0.15s;background:var(--surface2)}
.role-card:hover{border-color:rgba(200,240,110,0.5);background:rgba(200,240,110,0.04)}
.role-card.selected{border-color:var(--accent);background:rgba(200,240,110,0.08)}
.role-card-icon{font-size:22px;margin-bottom:5px}
.role-card-title{font-size:13px;font-weight:500}
.role-card-sub{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}

/* Auth buttons */
.auth-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:10px 14px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:8px;transition:background 0.15s}
.auth-btn:hover{background:var(--surface3)}
.auth-divider{display:flex;align-items:center;gap:8px;margin:10px 0;color:var(--text3);font-size:11px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:0.5px;background:var(--border2)}
.auth-err{font-size:12px;color:var(--red);margin-bottom:8px;display:none}
.auth-err.show{display:block}
.back-link{font-size:12px;color:var(--text3);cursor:pointer;margin-top:8px;display:inline-block}
.back-link:hover{color:var(--text2)}

/* Dancer profile popup */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.popup-overlay.hidden{display:none}
.popup{background:var(--surface);border:0.5px solid var(--border2);border-radius:16px;width:360px;max-height:85vh;overflow-y:auto}
.popup-head{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.popup-avatar{width:40px;height:40px;border-radius:50%;background:rgba(200,240,110,0.1);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0}
.popup-title{flex:1;min-width:0}
.popup-name{font-size:15px;font-weight:500}
.popup-bib{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
.popup-close{border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;padding:4px}
.popup-close:hover{color:var(--text)}
.popup-body{padding:16px 18px}
.popup-section{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;margin-top:14px}
.popup-section:first-child{margin-top:0}
.popup-comp-row{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
.popup-assign-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:0.5px solid var(--border);gap:8px}
.popup-assign-row:last-child{border-bottom:none}
.popup-empty{font-size:12px;color:var(--text3);padding:8px 0}

/* Sync */
.sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text3);margin-right:4px;vertical-align:middle}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.synced{background:var(--accent)}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Topbar */
.topbar{padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.topbar-left h1{font-size:15px;font-weight:500;color:var(--text)}
.topbar-left p{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.accent-dot{display:inline-block;width:7px;height:7px;background:var(--accent);border-radius:50%;margin-right:6px;vertical-align:middle}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:0.5px solid var(--border);border-radius:20px;padding:3px 10px 3px 3px;font-size:11px;cursor:pointer;flex-shrink:0;max-width:160px}
.user-chip img{width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0}
.user-chip-av{width:20px;height:20px;border-radius:50%;background:rgba(200,240,110,0.15);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:var(--accent);flex-shrink:0}
.user-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.role-badge{font-size:9px;font-family:'DM Mono',monospace;padding:1px 5px;border-radius:3px;font-weight:500;flex-shrink:0}
.role-badge.admin{background:rgba(200,240,110,0.15);color:var(--accent)}
.role-badge.dancer{background:rgba(110,168,240,0.15);color:var(--blue)}

/* Search */
.search-wrap{padding:10px 16px 0;position:relative}
.search-wrap input{width:100%;background:var(--surface);border:0.5px solid var(--border2);border-radius:20px;padding:8px 14px 8px 34px;font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:27px;top:19px;color:var(--text3);font-size:13px;pointer-events:none}

/* Nav */
.nav{display:flex;padding:10px 16px 0;border-bottom:0.5px solid var(--border)}
.nav-tab{flex:1;text-align:center;padding:7px 2px;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap}
.nav-tab:hover{color:var(--text2)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Interactive drag-follow swipe ── */
#swipe-container{
  overflow:hidden;
  /* height is set dynamically by JS to tallest visible panel */
}
/* The inner track holds ALL panels side by side */
#swipe-track{
  display:flex;
  width:400%; /* 4 panels × 100% */
  will-change:transform;
  transition:none; /* JS controls this */
  align-items:flex-start;
}
/* Each panel slot takes exactly 25% of the track = 100% viewport */
.panel{
  flex:0 0 25%;
  width:25%;
  padding:14px 16px;
  box-sizing:border-box;
  /* always rendered — visibility controlled by track position */
}
/* home panel is outside the track, handled separately */
#panel-home{padding:14px 16px}
.panel.active,#panel-home.active{display:block}

/* Form */
.form-row{margin-bottom:10px}
.form-row label{font-size:11px;color:var(--text3);display:block;margin-bottom:4px;font-family:'DM Mono',monospace;letter-spacing:0.3px}
.form-row input,.form-row select{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--r);padding:8px 10px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s}
.form-row input:focus,.form-row select:focus{border-color:var(--accent)}
.form-row input::placeholder{color:var(--text3)}
select option{background:var(--surface2)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* Comp block */
.comp-block{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.comp-block-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.comp-flags{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.comp-flag-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.comp-flag-label span{color:var(--accent)}

/* Buttons */
.btn-full{width:100%;padding:10px;background:var(--accent);color:#0e0f11;border:none;border-radius:var(--r);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background 0.15s;margin-top:4px}
.btn-full:hover{background:var(--accent2)}
.btn-full:disabled{opacity:0.4;cursor:not-allowed}
.btn-full.generate{border-radius:var(--rl);font-size:14px;padding:12px;margin-top:0;margin-bottom:12px}
.btn-full.export{background:transparent;border:0.5px solid rgba(110,200,200,0.4);color:var(--teal);margin-top:0}
.btn-full.export:hover{background:rgba(110,200,200,0.06)}
.btn-sm-accent{background:rgba(200,240,110,0.1);border:0.5px solid rgba(200,240,110,0.3);color:var(--accent);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s}
.btn-sm-accent:hover{background:rgba(200,240,110,0.18)}
.btn-icon{border:none;background:transparent;color:var(--text3);cursor:pointer;padding:4px 5px;border-radius:4px;font-size:14px;line-height:1;transition:color 0.15s}
.btn-icon:hover{color:var(--text)}
.btn-icon.edit:hover{color:var(--teal)}
.btn-icon.del:hover{color:var(--red)}

/* Clickable name link */
.name-link{cursor:pointer;color:inherit;text-decoration:none;border-bottom:0.5px dashed var(--border2);transition:border-color 0.15s}
.name-link:hover{border-bottom-color:var(--accent);color:var(--accent)}

/* Badges */
.badge{display:inline-block;font-size:10px;font-family:'DM Mono',monospace;padding:1px 6px;border-radius:4px;font-weight:500;letter-spacing:0.2px}
.b-fri{background:rgba(110,200,200,0.15);color:var(--teal)}
.b-sat{background:rgba(200,240,110,0.15);color:var(--accent)}
.b-sun{background:rgba(240,196,110,0.15);color:var(--amber)}
.b-div{background:rgba(164,110,240,0.15);color:var(--purple)}
.b-cross{background:rgba(110,200,200,0.12);color:var(--teal)}
.b-lead{background:rgba(110,168,240,0.15);color:var(--blue)}
.b-foll{background:rgba(240,110,110,0.12);color:var(--red)}

/* Dancer list */
.dancer-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.dancer-head{display:flex;align-items:center;gap:10px;padding:10px 12px}
.dancer-avatar{width:28px;height:28px;border-radius:50%;background:rgba(200,240,110,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0}
.dancer-info{flex:1;min-width:0}
.dancer-name{font-size:13px;font-weight:500}
.dancer-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.dancer-actions{display:flex;gap:2px;flex-shrink:0}
.dancer-comps{padding:0 12px 10px}
.comp-pill{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:0.5px solid var(--border);border-radius:20px;padding:2px 8px;font-size:10px;margin:2px;font-family:'DM Mono',monospace}
.edit-wrap{padding:12px;border-top:0.5px solid var(--border);background:rgba(200,240,110,0.02)}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.edit-grid input,.edit-grid select,.edit-wrap select,.edit-wrap input{background:var(--surface2);border:0.5px solid var(--border2);border-radius:6px;padding:6px 8px;font-size:12px;color:var(--text);outline:none;width:100%;font-family:'DM Sans',sans-serif}
.edit-comp-block{background:var(--surface3);border:0.5px solid var(--border);border-radius:var(--r);padding:10px;margin-top:8px}
.edit-actions{display:flex;gap:6px;margin-top:10px}
.edit-actions button{flex:1;padding:7px;font-size:12px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border2);background:transparent;color:var(--text2);transition:all 0.15s}
.edit-actions .save-btn{background:var(--accent);color:#0e0f11;border-color:var(--accent);font-weight:500}
.edit-actions .save-btn:hover{background:var(--accent2)}

/* Schedule */
.sched-day{margin-bottom:18px}
.sched-day-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sched-div-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden}
.sched-div-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px}
.sched-div-name{font-size:12px;font-weight:500}
.sched-div-cfg{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sched-div-cfg input{width:46px;text-align:center;background:var(--surface2);border:0.5px solid var(--border2);border-radius:6px;padding:4px;font-size:12px;color:var(--text);outline:none}
.sched-div-cfg input:disabled{opacity:0.4;cursor:not-allowed}
.sched-div-cfg span{font-size:11px;color:var(--text3)}
.sched-rounds{border-top:0.5px solid var(--border)}
.sched-round-row{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;border-bottom:0.5px solid var(--border)}
.sched-round-row:last-child{border-bottom:none}
.sched-round-name{font-size:11px;color:var(--text2)}
.sched-round-time{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)}
.sched-round-marshal{font-size:10px;font-family:'DM Mono',monospace;color:var(--amber)}

/* Assignments — single column layout */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px}
.stat-val{font-size:18px;font-weight:500;color:var(--text);font-family:'DM Mono',monospace}
.stat-val.green{color:var(--accent)}.stat-val.teal{color:var(--teal)}.stat-val.red{color:var(--red)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:1px}
.recorder-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden}
.recorder-head{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:0.5px solid var(--border)}
.r-avatar{width:28px;height:28px;border-radius:50%;background:rgba(200,240,110,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0}
.r-name{font-weight:500;font-size:13px}
.r-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.assign-row{padding:9px 14px;border-bottom:0.5px solid var(--border)}
.assign-row:last-child{border-bottom:none}
.assign-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.assign-for{font-size:13px;font-weight:500}
.assign-bib{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)}
.assign-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap}
.assign-badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.assign-note{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px}

/* Unassigned card — collapsible, full width above recorder list */
.ua-card{background:var(--surface);border:0.5px solid rgba(240,110,110,0.3);border-radius:var(--rl);overflow:hidden;margin-bottom:14px;position:relative}
.ua-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--border);background:rgba(240,110,110,0.06)}
.ua-head-left{flex:1}
.ua-title{font-size:12px;font-weight:500;color:var(--red)}
.ua-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.ua-expand-btn{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);background:transparent;border:0.5px solid var(--border2);border-radius:6px;padding:4px 10px;cursor:pointer;white-space:nowrap;transition:color 0.15s,border-color 0.15s;flex-shrink:0}
.ua-expand-btn:hover{color:var(--text);border-color:var(--border)}
.ua-body{position:relative}
.ua-body.collapsed{max-height:120px;overflow:hidden}
.ua-body.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(--surface));pointer-events:none}
.ua-section{padding:7px 14px 3px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;border-top:0.5px solid var(--border)}
.ua-section:first-of-type{border-top:none;padding-top:9px}
.ua-name{font-weight:500}
.ua-detail{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);margin-top:1px}
.ua-tag{font-size:10px;font-family:'DM Mono',monospace;color:var(--red);flex-shrink:0;margin-top:2px}

/* Search results */
.search-result-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.sr-head{display:flex;align-items:center;gap:10px;padding:10px 12px}
.sr-body{padding:8px 12px 10px;border-top:0.5px solid var(--border);background:var(--surface2)}
.sr-section{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;margin-top:8px}
.sr-section:first-child{margin-top:0}
.sr-assign-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:0.5px solid var(--border);gap:8px;font-size:12px}
.sr-assign-row:last-child{border-bottom:none}

.warn-box{background:rgba(240,196,110,0.08);border:0.5px solid rgba(240,196,110,0.3);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--amber);margin-bottom:10px}
/* ── Dancer home profile panel ── */
.home-hero{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:12px}
.home-hero-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.home-avatar{width:48px;height:48px;border-radius:50%;background:rgba(200,240,110,0.12);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0}
.home-name{font-size:16px;font-weight:500}
.home-bib{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.home-section{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;margin-top:14px}
.home-section:first-of-type{margin-top:0}
.home-comp-row{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
.home-assign-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--border);gap:8px}
.home-assign-row:last-child{border-bottom:none}
.home-empty{font-size:12px;color:var(--text3);padding:6px 0}
.home-edit-btn{width:100%;padding:9px;background:transparent;border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px;transition:background 0.15s}
.home-edit-btn:hover{background:var(--surface2)}

function resolveRole(email,uid){
  const e=(email||'').toLowerCase().trim();

  if(ADMIN_UID_WHITELIST.includes(uid))return'admin';

// ── LOGIN FLOW ────────────────────────────────────────────────────────────────
function skipLogin(){
  currentUser=null;currentRole='dancer';
  document.getElementById('login-modal').classList.add('hidden');
  onLoginComplete();
}

// Google GSI
function renderGSIButton(){
  const wrap=document.getElementById('gsi-btn-wrap');
  wrap.innerHTML='';
  if(typeof google==='undefined'||!google.accounts){document.getElementById('gsi-fallback').style.display='flex';return;}
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleGoogleCredential,auto_select:false});
  google.accounts.id.renderButton(wrap,{theme:'filled_black',size:'large',shape:'rectangular',width:240,text:'continue_with'});
}
function triggerGoogle(){if(typeof google!=='undefined')google.accounts.id.prompt();}

function handleGoogleCredential(response){
  try{
    const p=JSON.parse(atob(response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    const fbCredential=firebase.auth.GoogleAuthProvider.credential(response.credential);
    auth.signInWithCredential(fbCredential).then(result=>{
      const uid=result.user.uid;
      const email=p.email||'';
      currentUser={name:p.name||email,email,picture:p.picture||null,provider:'google',uid};
      currentRole=resolveRole(email,uid);
      saveUserRole();
      document.getElementById('login-modal').classList.add('hidden');
      onLoginComplete();
    }).catch(e=>{showAuthErr(e.message);});
  }catch(e){showAuthErr('Sign-in failed. Please try again.');}
}

// Email/password
function emailSignIn(){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-password').value;
  if(!email||!pw){showAuthErr('Enter email and password.');return;}
  auth.signInWithEmailAndPassword(email,pw).then(result=>{
    const uid=result.user.uid;
    currentUser={name:result.user.displayName||email,email,provider:'email',uid};
    currentRole=resolveRole(email,uid);
    saveUserRole();
    document.getElementById('login-modal').classList.add('hidden');
    onLoginComplete();
  }).catch(e=>{showAuthErr(friendlyAuthErr(e.code));});
}

function emailSignUp(){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-password').value;
  if(!email||!pw){showAuthErr('Enter email and password.');return;}
  if(pw.length<6){showAuthErr('Password must be at least 6 characters.');return;}
  auth.createUserWithEmailAndPassword(email,pw).then(result=>{
    const uid=result.user.uid;
    currentUser={name:email,email,provider:'email',uid};
    currentRole=resolveRole(email,uid);
    saveUserRole();
    document.getElementById('login-modal').classList.add('hidden');
    onLoginComplete();
  }).catch(e=>{showAuthErr(friendlyAuthErr(e.code));});
}

function showStep(stepId){
  // Only one step now — kept for compatibility
  document.getElementById('step-auth').classList.add('active');
}

function friendlyAuthErr(code){
  return{
    'auth/user-not-found':'No account found with this email.',
    'auth/wrong-password':'Incorrect password.',
    'auth/email-already-in-use':'Email already in use. Try signing in.',
    'auth/invalid-email':'Invalid email address.',
    'auth/too-many-requests':'Too many attempts. Try again later.',
    'auth/invalid-credential':'Invalid email or password.',
  }[code]||'Sign-in failed. Please try again.';
}

function showAuthErr(msg){
  const el=document.getElementById('auth-err');
  el.textContent=msg;el.classList.add('show');
}

function saveUserRole(){
  if(currentUser?.uid) db.collection('users').doc(currentUser.uid).set({name:currentUser.name,email:currentUser.email,role:currentRole,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(console.error);
}

function signOut(){
  auth.signOut().catch(()=>{});
  if(unsubDancers){unsubDancers();unsubDancers=null;}
  if(unsubAssignments){unsubAssignments();unsubAssignments=null;}
  currentUser=null;currentRole=null;dancers=[];lastResults=[];savedAssignments=[];

  TAB_ORDER_NAV.forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t==='add'));

  currentTabIndex=0;
  isAnimating=false;

  document.getElementById('panel-home').style.display='none';

// ── FIRESTORE ─────────────────────────────────────────────────────────────────
function startFirestoreListeners(){
  setSyncStatus('syncing');
  if(unsubDancers)unsubDancers();
  unsubDancers=db.collection('dancers').orderBy('createdAt','asc').onSnapshot(snap=>{
    dancers=snap.docs.map(d=>({...d.data(),id:d.id}));
    document.getElementById('dancer-count').textContent=dancers.length;
    if(document.getElementById('panel-dancers').classList.contains('active'))renderDancerList();
    // For dancer role: always try to show home if linked profile exists
    if(currentRole==='dancer'&&currentUser?.uid){
      const linked=dancers.find(d=>d.linkedUid===currentUser.uid);
      if(linked){
        // Always switch to home — switchTab is idempotent so safe to call every sync
        if(currentTabIndex===0){
          // Already on the first tab — directly show home
          document.getElementById('swipe-container').style.display='none';
          document.getElementById('panel-home').style.display='block';
          renderHomeProfile(linked);
        }
        // If user has navigated away from home, don't interrupt them
      }
    }
    setSyncStatus('synced');
  },e=>{console.error(e);setSyncStatus('error');});

  if(unsubAssignments)unsubAssignments();
  unsubAssignments=db.collection('meta').doc('assignments').onSnapshot(snap=>{
    if(snap.exists){
      savedAssignments=snap.data().results||[];lastResults=[...savedAssignments];
      if(document.getElementById('panel-assign').classList.contains('active'))renderAssignmentsFromSaved();
      // Refresh home panel if visible
      if(currentRole==='dancer'&&currentUser?.uid){
        const linked=dancers.find(d=>d.linkedUid===currentUser.uid);
        if(linked&&document.getElementById('panel-home').style.display!=='none'&&document.getElementById('panel-home').style.display!=='')renderHomeProfile(linked);
      }
    }
  });

  db.collection('meta').doc('maxHeats').get().then(snap=>{if(snap.exists)Object.assign(divMaxHeats,snap.data());}).catch(()=>{});
}

// ── NAV & TRACK-BASED SWIPE ───────────────────────────────────────────────────
const TAB_ORDER_NAV=['add','dancers','schedule','assign'];
let currentTabIndex=0;
let isAnimating=false;

function getTrackX(idx){return-(idx*25);}

function setTrackInstant(idx){
  const track=document.getElementById('swipe-track');
  if(!track)return;
  track.style.transition='none';
  track.style.transform=`translateX(${getTrackX(idx)}%)`;
  _syncHeight(idx);
  _watchPanelHeight(idx);
}

function setTrackAnimated(idx,onDone){
  const track=document.getElementById('swipe-track');
  if(!track){isAnimating=false;if(onDone)onDone();return;}
  isAnimating=true;
  track.style.transition='transform 0.32s cubic-bezier(0.4,0,0.2,1)';
  track.style.transform=`translateX(${getTrackX(idx)}%)`;
  const done=()=>{
    track.style.transition='none';
    _syncHeight(idx);
    _watchPanelHeight(idx);
    isAnimating=false;
    if(onDone)onDone();
  };
  track.addEventListener('transitionend',done,{once:true});
  setTimeout(()=>{if(isAnimating)done();},390);
}

function _syncHeight(idx){
  const ids=['panel-add','panel-dancers','panel-schedule','panel-assign'];
  const el=document.getElementById(ids[idx]);
  const container=document.getElementById('swipe-container');
  if(!el||!container)return;
  // Use scrollHeight (includes overflow), fallback to offsetHeight
  const h=Math.max(el.scrollHeight,el.offsetHeight,200);
  container.style.height=h+'px';
}

// Auto-sync height whenever the active panel's content changes (e.g. adding comp blocks)
let _heightObserver=null;
function _watchPanelHeight(idx){
  if(_heightObserver)_heightObserver.disconnect();
  const ids=['panel-add','panel-dancers','panel-schedule','panel-assign'];
  const el=document.getElementById(ids[idx]);
  if(!el||typeof ResizeObserver==='undefined')return;
  _heightObserver=new ResizeObserver(()=>_syncHeight(idx));
  _heightObserver.observe(el);
}

function switchTab(tab,animate=true){
  const newIdx=TAB_ORDER_NAV.indexOf(tab);
  if(newIdx<0)return;

  const linkedProfile=(currentRole==='dancer'&&currentUser?.uid)
    ?dancers.find(d=>d.linkedUid===currentUser.uid):null;

  TAB_ORDER_NAV.forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===tab));
  document.getElementById('search-results-wrap').style.display='none';

  // Home panel: hide track, show home div
  if(tab==='add'&&linkedProfile){
    document.getElementById('swipe-container').style.display='none';
    document.getElementById('panel-home').style.display='block';
    currentTabIndex=0;
    renderHomeProfile(linkedProfile);
    return;
  }

  // For all other tabs (or no linked profile): restore track
  document.getElementById('swipe-container').style.display='block';
  document.getElementById('panel-home').style.display='none';

  if(animate&&newIdx!==currentTabIndex){
    setTrackAnimated(newIdx,()=>{
      currentTabIndex=newIdx;
      _afterSwitch(tab);
    });
  } else {
    setTrackInstant(newIdx);
    currentTabIndex=newIdx;
    _afterSwitch(tab);
  }
}

function _afterSwitch(tab){
  if(tab==='dancers')renderDancerList();
  if(tab==='schedule')buildSchedulePanel();
  if(tab==='assign'&&savedAssignments.length)renderAssignmentsFromSaved();
  // Sync height after content renders, then watch for further changes
  requestAnimationFrame(()=>{
    _syncHeight(currentTabIndex);
    _watchPanelHeight(currentTabIndex);
  });
}

window.addEventListener('resize',()=>_syncHeight(currentTabIndex));

function addInlineComp(){
  const list=document.getElementById('iec-list');if(!list)return;
  const ci=list.children.length; // ci>=1 since first block always exists
  const tmp=document.createElement('div');
  // Pass ci >= 1 so delete button is rendered
  const html=buildCompBlock({div:Object.keys(DIVISIONS)[3],role:'follower',heat:'',needFilming:'yes',canFilm:'yes',filmDates:['Fri 17 Apr','Sat 18 Apr','Sun 19 Apr']},Math.max(ci,1));
  tmp.innerHTML=html;
  const newBlock=tmp.firstElementChild;
  // Ensure ID matches actual position
  newBlock.id=`iec-${ci}`;
  newBlock.querySelector('.ec-div').id=`ecd-inline-${ci}`;
  const removeBtn=newBlock.querySelector('.btn-icon.del');
  if(removeBtn)removeBtn.setAttribute('onclick',`removeInlineComp(${ci})`);
  list.appendChild(newBlock);
  const sel=document.getElementById(`ecd-inline-${ci}`);
  if(sel)buildDivSelect(sel,Object.keys(DIVISIONS)[3]);
  requestAnimationFrame(()=>_syncHeight(0));
}

// Inline edit: remove a competition block and re-number
function removeInlineComp(idx){
  const list=document.getElementById('iec-list');if(!list)return;
  const el=document.getElementById(`iec-${idx}`);if(el)el.remove();
  // Re-number remaining blocks
  Array.from(list.querySelectorAll('.edit-comp-block')).forEach((b,i)=>{
    b.id=`iec-${i}`;
    const title=b.querySelector('.comp-block-title span');
    if(title)title.textContent=`Competition ${i+1}`;
    const divSel=b.querySelector('.ec-div');
    if(divSel)divSel.id=`ecd-inline-${i}`;
    const removeBtn=b.querySelector('.btn-icon.del');
    if(removeBtn)removeBtn.setAttribute('onclick',`removeInlineComp(${i})`);
  });
  requestAnimationFrame(()=>_syncHeight(0));
}

function cancelInlineEdit(){
  editingId=null;

  if(linked){

    document.getElementById('swipe-container').style.display='block';
    document.getElementById('panel-home').style.display='none';
    setTrackInstant(0);

async function saveInlineEdit(id){
  const name=document.getElementById('ie-name')?.value.trim();if(!name)return;
  const bib=document.getElementById('ie-bib')?.value.trim()||'';
  const compBlocks=document.querySelectorAll('#iec-list .edit-comp-block');
  const comps=Array.from(compBlocks).map(cb=>({
    div:cb.querySelector('.ec-div').value,
    role:cb.querySelector('.ec-role')?.value||'follower',
    heat:parseInt(cb.querySelector('.ec-heat')?.value)||null,
    needFilming:cb.querySelector('.ec-nf').value,
    canFilm:cb.querySelector('.ec-cf').value,
    filmDates:Array.from(cb.querySelectorAll('.ec-fd:checked')).map(el=>el.value),
  }));
  setSyncStatus('syncing');
  try{
    await db.collection('dancers').doc(id).update({name,bib,competitions:comps,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    editingId=null;setSyncStatus('synced');
    cancelInlineEdit();
  }catch(e){console.error(e);setSyncStatus('error');}
}

// ── SCHEDULING LOGIC ──────────────────────────────────────────────────────────
function toMins(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function toTime(m){return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;}
function heatWin(rs,hn){const s=toMins(rs)+(hn-1)*HEAT_DUR;return{s,e:s+HEAT_DUR};}

// Get the busy window for a dancer's comp in a given round
function compBusyWindow(comp,round){
  if((round.type==='prelim'||round.type==='semi')&&comp.heat){
    const hw=heatWin(round.start,comp.heat);
    return{s:toMins(round.marshalBy),e:hw.e+2};
  }
  return{s:toMins(round.marshalBy),e:toMins(round.end)};
}

// Check if dancer's ALL comps make them busy during [ws,we]
function isDancerBusy(dancer,ws,we){
  return(dancer.competitions||[]).some(c=>{
    const div=DIVISIONS[c.div];if(!div)return false;
    return div.rounds.some(r=>{const bw=compBusyWindow(c,r);return ws<bw.e&&we>bw.s;});
  });
}

// Core: can recorder (with recComp) record target (tgtComp) during round?
// Returns {s,e,note} window or null
// NEW cross-division heat logic:
//   If recorder is in a DIFFERENT division and that division runs an overlapping round,
//   check if their heat ends at least CROSS_DIV_BUFFER heats worth of time (2*HEAT_DUR)
//   before the target's heat starts, OR target's heat ends that far before recorder's heat.
function getRecWin(recComp,tgtComp,round){
  const isHR=round.type==='prelim'||round.type==='semi';

  // --- Target's recording window ---
  let ts,te;
  if(isHR&&tgtComp.heat){const hw=heatWin(round.start,tgtComp.heat);ts=hw.s;te=hw.e;}
  else{ts=toMins(round.marshalBy);te=toMins(round.end);}

  // --- Same division cross-heat ---
  if(recComp.div===tgtComp.div){
    if(!isHR||!recComp.heat||!tgtComp.heat||recComp.heat===tgtComp.heat)return null;
    const rh=heatWin(round.start,recComp.heat);
    if(recComp.heat<tgtComp.heat&&rh.e+2<=ts)return{s:ts,e:te,note:`heat ${recComp.heat} done → records heat ${tgtComp.heat}`};
    if(recComp.heat>tgtComp.heat&&te+2<=rh.s)return{s:ts,e:te,note:`records heat ${tgtComp.heat} before own heat ${recComp.heat}`};
    return null;
  }

  // --- Cross-division ---
  const recDiv=DIVISIONS[recComp.div];if(!recDiv)return{s:ts,e:te,note:''};

  // Find any overlapping round in recorder's division
  const overlappingRecRound=recDiv.rounds.find(rr=>{
    const bw=compBusyWindow(recComp,rr);
    return ts<bw.e&&te>bw.s;
  });

  if(!overlappingRecRound){
    // Recorder has nothing going on — free to record
    return{s:ts,e:te,note:''};
  }

  // There IS an overlap — check if heat timing gives enough gap
  if(isHR&&recComp.heat&&tgtComp.heat&&
     (overlappingRecRound.type==='prelim'||overlappingRecRound.type==='semi')){
    const recHw=heatWin(overlappingRecRound.start,recComp.heat);
    const bufferMins=CROSS_DIV_BUFFER*HEAT_DUR;
    // Recorder finishes early enough before target starts
    if(recHw.e+bufferMins<=ts){
      return{s:ts,e:te,note:`${recComp.div.replace(/_/g,' ')} heat ${recComp.heat} done ${Math.round((ts-recHw.e)/HEAT_DUR)} heats before`};
    }
    // Target finishes early enough before recorder starts
    if(te+bufferMins<=recHw.s){
      return{s:ts,e:te,note:`records before ${recComp.div.replace(/_/g,' ')} heat ${recComp.heat}`};
    }
  }
  return null;
}

async function generateAssignments(){
  if(currentRole!=='admin'){alert('Only admins can generate assignments.');return;}
  if(dancers.length<2){document.getElementById('output').innerHTML='<div class="warn-box">Add at least 2 dancers first.</div>';return;}
  const results=[],noRecorder=[],noTasks=[];
  const recBusy={};
  function isBusy(name,s,e){return(recBusy[name]||[]).some(x=>s<x.e&&e>x.s);}
  function markBusy(name,s,e){if(!recBusy[name])recBusy[name]=[];recBusy[name].push({s,e});}

  dancers.forEach(tgt=>{
    (tgt.competitions||[]).forEach(tgtC=>{
      if(tgtC.needFilming!=='yes')return;
      const div=DIVISIONS[tgtC.div];if(!div)return;
      div.rounds.forEach(round=>{
        const avail=[];
        dancers.forEach(rec=>{
          if(rec.id===tgt.id)return;
          (rec.competitions||[]).forEach(recC=>{
            if(recC.canFilm!=='yes')return;
            const w=getRecWin(recC,tgtC,round);if(!w)return;
            if(isDancerBusy(rec,w.s,w.e))return;
            if(isBusy(rec.name,w.s,w.e))return;
            avail.push({dancer:rec,comp:recC,win:w});
          });
        });
        if(avail.length){
          avail.sort((a,b)=>(recBusy[a.dancer.name]||[]).length-(recBusy[b.dancer.name]||[]).length);
          const best=avail[0];
          markBusy(best.dancer.name,best.win.s,best.win.e);
          results.push({
            recorder:best.dancer.name,recBib:best.dancer.bib||'',recRole:best.comp.role,
            forDancer:tgt.name,forBib:tgt.bib||'',forRole:tgtC.role,
            divLabel:div.label,day:div.day,badge:div.badge,round:round.round,
            timeStr:`${toTime(best.win.s)}–${toTime(best.win.e)}`,
            crossHeat:best.comp.div===tgtC.div,note:best.win.note
          });
        } else {
          if(round.type!=='final') // don't flag finals as unassigned
            noRecorder.push({name:tgt.name,bib:tgt.bib||'',divLabel:div.label,day:div.day,round:round.round});
        }
      });
    });
  });

  const hasTask=new Set(results.map(r=>r.recorder));
  dancers.forEach(d=>{
    if((d.competitions||[]).some(c=>c.canFilm==='yes')&&!hasTask.has(d.name))
      noTasks.push({name:d.name,bib:d.bib||''});
  });

  lastResults=[...results];savedAssignments=[...results];
  setSyncStatus('syncing');
  try{
    await db.collection('meta').doc('assignments').set({results,noRecorder,noTasks,generatedAt:firebase.firestore.FieldValue.serverTimestamp(),generatedBy:currentUser?.uid||'admin'});
    setSyncStatus('synced');
  }catch(e){console.error(e);setSyncStatus('error');}
  renderAssignmentsUI(results,noRecorder,noTasks);
}

let _maTarget=null;

// Called from HTML with individual safe string args
function openManualAssignById(name,divLabel,round,day,bib){
  openManualAssign({name,divLabel,round,day,bib});
}

function openManualAssign(u){
  _maTarget=u;
  document.getElementById('ma-title').textContent=`Assign recorder for ${u.name}`;
  document.getElementById('ma-subtitle').textContent=`${u.divLabel} · ${u.day} · ${u.round}`;

  // Find the target dancer's full record
  const tgtDancer=dancers.find(d=>d.name===u.name);
  if(!tgtDancer){return;}

  // Find which division+round this is about
  const divKey=Object.keys(DIVISIONS).find(k=>DIVISIONS[k].label===u.divLabel);
  const div=DIVISIONS[divKey];
  if(!div)return;
  const round=div.rounds.find(r=>r.round===u.round);
  if(!round)return;

  // Get the target's competition entry for this div
  const tgtComp=(tgtDancer.competitions||[]).find(c=>c.div===divKey);

  // Compute target's actual time window for this round+heat
  const isHR=round.type==='prelim'||round.type==='semi';
  let tgtStart,tgtEnd;
  if(isHR&&tgtComp?.heat){
    const hw=heatWin(round.start,tgtComp.heat);
    tgtStart=toMins(round.marshalBy); // from marshal time
    tgtEnd=hw.e+2;                    // heat end + buffer
  } else {
    tgtStart=toMins(round.marshalBy);
    tgtEnd=toMins(round.end);
  }

  // Helper: does a recorder's single recComp physically clash with [tgtStart,tgtEnd]?
  function getClashReason(rec,rc){
    const rcDiv=DIVISIONS[rc.div];
    if(!rcDiv) return null;

    // Check all rounds of recorder's comp for time overlap
    for(const rr of rcDiv.rounds){
      const bw=compBusyWindow(rc,rr);
      if(!(tgtStart>=bw.e||tgtEnd<=bw.s)){
        // There IS a time overlap — now determine specifics
        if(rc.div===divKey){
          // Same division
          if(isHR&&rc.heat&&tgtComp?.heat){
            const diff=Math.abs(Number(rc.heat)-Number(tgtComp.heat));
            if(diff===0) return 'same division & same heat';
            if(diff===1) return 'same division, adjacent heat (±1)';
            return 'same division, heat timing overlap';
          }
          return 'same division';
        } else {
          // Different division but times overlap
          if(isHR&&rc.heat&&tgtComp?.heat&&
             (rr.type==='prelim'||rr.type==='semi')){
            const recHw=heatWin(rr.start,rc.heat);
            const bufMins=CROSS_DIV_BUFFER*HEAT_DUR;
            // Enough gap?
            if(recHw.e+bufMins<=tgtStart||tgtEnd+bufMins<=recHw.s) return null; // actually OK
          }
          return `time clash — ${rcDiv.label} (${rcDiv.day})`;
        }
      }
    }
    return null; // no clash from this comp
  }

  const safe=[], warned=[];
  dancers.forEach(rec=>{
    if(rec.name===u.name) return;
    const recComps=(rec.competitions||[]).filter(rc=>rc.canFilm==='yes');
    if(!recComps.length) return;
    if(!tgtComp) return;

    // Also check filmDates availability
    const targetDay=div?.day||'';
    const dateAvailable=recComps.some(rc=>{
      const dates=rc.filmDates||['Fri 17 Apr','Sat 18 Apr','Sun 19 Apr'];
      return dates.some(d=>targetDay.includes(d.split(' ')[0])||targetDay===d);
    });

    // Find the worst clash reason across ALL canFilm comps
    let worstClash=null;
    let hasSafeComp=false;
    recComps.forEach(rc=>{
      const clash=getClashReason(rec,rc);
      if(!clash){
        // Double-check with getRecWin for cross-div buffer
        const win=getRecWin(rc,tgtComp,round);
        if(win) hasSafeComp=true;
        else if(!worstClash) worstClash='schedule too tight';
      } else {
        // Rank clashes: same-heat is worst
        if(!worstClash||clash.includes('same division')) worstClash=clash;
      }
    });

    const rcFirst=recComps[0];
    const rcDiv=DIVISIONS[rcFirst.div];
    const entry={name:rec.name,bib:rec.bib||'',recComp:rcFirst,recDivLabel:rcDiv?.label||rcFirst.div,note:''};

    if(hasSafeComp&&!worstClash){
      // Truly free — find the best comp window for the note
      let bestNote='';
      recComps.forEach(rc=>{const w=getRecWin(rc,tgtComp,round);if(w&&!bestNote)bestNote=w.note||'';});
      safe.push({...entry,note:bestNote});
    } else if(hasSafeComp&&worstClash){
      // Has a safe path but also has a conflict comp — show as safe with note
      safe.push({...entry,note:'has other comps with conflicts'});
    } else {
      // No safe path
      const reason=worstClash||'schedule conflict';
      warned.push({...entry,warnReason:reason});
    }
  });

  const safeNames=new Set(safe.map(e=>e.name));
  const warnDedupe=warned.filter(w=>!safeNames.has(w.name));
  const safeDedupe=safe;

  // Build modal body
  const existingRec=savedAssignments.find(a=>a.forDancer===u.name&&a.divLabel===u.divLabel&&a.round===u.round);

  let body=`<div class="ma-comp-block">
    <div class="ma-comp-title">${u.divLabel} — ${u.round} · ${u.day}</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">Select a recorder for <strong>${esc(u.name)}</strong>${u.bib?` (#${esc(u.bib)})`:''}:</div>
    <div class="ma-recorder-row">
      <label class="ma-recorder-label" style="white-space:nowrap">Assign to</label>
      <select class="ma-recorder-select" id="ma-select-0">
        <option value="">— choose recorder —</option>`;

  if(safeDedupe.length){
    body+=`<optgroup label="✓ Available">`;
    safeDedupe.forEach(e=>{
      const sel=existingRec&&existingRec.recorder===e.name?'selected':'';
      const note=e.note?` · ${e.note}`:'';
      body+=`<option value="${esc(e.name)}" ${sel}>${esc(e.name)}${e.bib?' #'+esc(e.bib):''}${note}</option>`;
    });
    body+=`</optgroup>`;
  }

  if(warnDedupe.length){
    body+=`<optgroup label="⚠ Conflict — use with caution">`;
    warnDedupe.forEach(e=>{
      const sel=existingRec&&existingRec.recorder===e.name?'selected':'';
      body+=`<option value="${esc(e.name)}" data-warn="1" ${sel}>⚠ ${esc(e.name)}${e.bib?' #'+esc(e.bib):''} — ${e.warnReason}</option>`;
    });
    body+=`</optgroup>`;
  }

  if(!safeDedupe.length&&!warnDedupe.length){
    body+=`<option disabled>No eligible recorders found</option>`;
  }

  body+=`</select></div>`;

  // Warning banner shown when a warned option is selected
  body+=`<div id="ma-warn-banner" style="display:none;margin-top:8px;padding:7px 10px;background:rgba(240,180,40,0.1);border:0.5px solid rgba(240,180,40,0.35);border-radius:6px;font-size:11px;color:var(--amber);font-family:'DM Mono',monospace"></div>`;

  if(!safeDedupe.length&&warnDedupe.length){
    body+=`<div style="font-size:11px;color:var(--amber);margin-top:8px">⚠ Only conflicted recorders available. Assignments may be difficult to fulfil.</div>`;
  }
  if(!safeDedupe.length&&!warnDedupe.length){
    body+=`<div style="font-size:11px;color:var(--red);margin-top:8px">No dancers with canFilm=yes found for this round.</div>`;
  }
  body+=`</div>`;

  document.getElementById('ma-body').innerHTML=body;
  document.getElementById('ma-overlay').classList.remove('hidden');

  // Wire up warning banner on select change
  const sel=document.getElementById('ma-select-0');
  if(sel){
    const banner=document.getElementById('ma-warn-banner');
    const updateBanner=()=>{
      const opt=sel.options[sel.selectedIndex];
      if(opt&&opt.dataset.warn==='1'){
        // Extract the warning reason from the option text (after ' — ')
        const txt=opt.textContent;
        const reason=txt.includes(' — ')?txt.split(' — ').slice(1).join(' — '):'schedule conflict';
        banner.textContent=`⚠ Warning: ${opt.textContent.replace(/^⚠\s*/,'')} — this recorder has a ${reason}. Manual oversight required.`;
        banner.style.display='block';
      } else {
        banner.style.display='none';
      }
    };
    sel.addEventListener('change',updateBanner);
    updateBanner(); // run once in case pre-selected is a warned option
  }
}

async function saveManualAssign(){
  if(!_maTarget)return;
  const sel=document.getElementById('ma-select-0');
  const recorderName=sel?.value;
  if(!recorderName){alert('Please select a recorder.');return;}

  const u=_maTarget;
  const divKey=Object.keys(DIVISIONS).find(k=>DIVISIONS[k].label===u.divLabel);
  const div=DIVISIONS[divKey];
  const round=div?.rounds.find(r=>r.round===u.round);
  const recDancer=dancers.find(d=>d.name===recorderName);
  const tgtDancer=dancers.find(d=>d.name===u.name);
  if(!recDancer||!tgtDancer||!round)return;

  const tgtComp=(tgtDancer.competitions||[]).find(c=>c.div===divKey);
  // Try to find a recComp with a valid window; fall back to any comp in same div, then first comp
  let recComp=(recDancer.competitions||[]).find(c=>getRecWin(c,tgtComp,round));
  if(!recComp) recComp=(recDancer.competitions||[]).find(c=>c.div===divKey);
  if(!recComp) recComp=(recDancer.competitions||[])[0];

  // Check if this is a warned (conflicted) assignment
  const selectedOpt=document.getElementById('ma-select-0')?.options[document.getElementById('ma-select-0')?.selectedIndex];
  const isWarned=selectedOpt?.dataset?.warn==='1';

  // Build the new assignment entry
  const isHR=round.type==='prelim'||round.type==='semi';
  let ts,te;
  if(isHR&&tgtComp?.heat){const hw=heatWin(round.start,tgtComp.heat);ts=hw.s;te=hw.e;}
  else{ts=toMins(round.marshalBy);te=toMins(round.end);}
  const win=recComp?getRecWin(recComp,tgtComp,round):null;

  const newAssignment={
    recorder:recorderName,recBib:recDancer.bib||'',
    forDancer:u.name,forBib:u.bib||'',forRole:tgtComp?.role||'',
    divLabel:u.divLabel,day:u.day,round:u.round,
    badge:div?.badge||'',
    timeStr:toTime(ts)+' – '+toTime(te),
    crossHeat:recComp?.div===divKey,
    note:(win?.note||(isWarned?'⚠ conflict — manually assigned':'manually assigned'))
  };

  // Merge into savedAssignments — remove any existing assignment for this slot
  const filtered=savedAssignments.filter(a=>
    !(a.forDancer===u.name&&a.divLabel===u.divLabel&&a.round===u.round)
  );
  const merged=[...filtered,newAssignment];

  setSyncStatus('syncing');
  try{
    await db.collection('meta').doc('assignments').set({
      results:merged,
      generatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      generatedBy:currentUser?.uid||'manual'
    });
    setSyncStatus('synced');
    closeMAModalDirect();
  }catch(e){console.error(e);setSyncStatus('error');}
}

// ── FINGER-TRACKING DRAG SWIPE ────────────────────────────────────────────────
(function(){
  const SNAP_THRESHOLD=50; // px to commit
  const RESISTANCE=0.3;    // edge rubber-band factor
  let dragging=false,dirLocked=false,isHoriz=false;
  let txStart=0,tyStart=0;
  let startTrackPct=0;

  function trackPctFromIdx(idx){return-(idx*25);}

  function setRaw(pct){
    const t=document.getElementById('swipe-track');
    if(t){t.style.transition='none';t.style.transform=`translateX(${pct}%)`;}
  }

  function isModalOpen(){
    const lm=document.getElementById('login-modal');
    const dp=document.getElementById('dancer-popup');
    return (lm&&!lm.classList.contains('hidden'))||(dp&&!dp.classList.contains('hidden'));
  }

  // Track whether the swipe originated from the home panel
  let swipeFromHome=false;

  document.addEventListener('touchstart',e=>{
    if(isModalOpen())return;
    // Block on interactive elements everywhere
    if(e.target.closest('input,select,textarea,button,a,.popup,.modal'))return;
    const t=e.touches[0];
    txStart=t.clientX;tyStart=t.clientY;
    dragging=false;dirLocked=false;isHoriz=false;
    swipeFromHome=!!e.target.closest('#panel-home');
    if(!swipeFromHome) startTrackPct=trackPctFromIdx(currentTabIndex);
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(isModalOpen()||isAnimating)return;
    if(e.target.closest('input,select,textarea,button,a,.popup,.modal'))return;
    if(!e.touches.length)return;
    const t=e.touches[0];
    const dx=t.clientX-txStart;
    const dy=t.clientY-tyStart;

    if(!dirLocked){
      if(Math.abs(dx)<5&&Math.abs(dy)<5)return;
      isHoriz=Math.abs(dx)>Math.abs(dy)*0.9;
      dirLocked=true;
      if(isHoriz) dragging=true;
    }
    if(!isHoriz||!dragging)return;

    if(swipeFromHome){
      // Only respond to left swipes (going forward)
      if(dx>=0) return;
      const W=window.innerWidth;
      const clampedDx=Math.max(dx,-W); // don't go past full screen width
      // Slide home panel left with finger
      const homeEl=document.getElementById('panel-home');
      if(homeEl) homeEl.style.transform=`translateX(${clampedDx}px)`;
      // Simultaneously show the track and slide it in from right
      const track=document.getElementById('swipe-track');
      const container=document.getElementById('swipe-container');
      if(container&&container.style.display==='none'){
        // First move: initialise track at idx=1 positioned off-screen right, then reveal
        container.style.display='block';
        container.style.opacity='0';
        if(track){track.style.transition='none';track.style.transform=`translateX(${getTrackX(1)}%)`;}
        // Force reflow before making visible
        container.offsetHeight;
        container.style.opacity='';
      }
      // Move track: starts from 100% right of viewport offset, follows finger proportionally
      const trackDx=(dx/W)*100/4; // px to track-% (track is 4x wide)
      const trackTarget=getTrackX(1)+(-trackDx); // starts further right, comes left
      if(track){track.style.transition='none';track.style.transform=`translateX(${Math.min(trackTarget,0)}%)`;}
      return;
    }

    // Track panels: move track with finger
    const W=window.innerWidth;
    let pct=(dx/W)*100/4;
    if((currentTabIndex===0&&dx>0)||(currentTabIndex===TAB_ORDER_NAV.length-1&&dx<0)){
      pct*=RESISTANCE;
    }
    setRaw(startTrackPct+pct);
  },{passive:true});

  document.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-txStart;
    const commit=Math.abs(dx)>SNAP_THRESHOLD;

    // Handle home swipe first
    if(swipeFromHome){
      swipeFromHome=false;dragging=false;
      const homeEl=document.getElementById('panel-home');
      const track=document.getElementById('swipe-track');
      const container=document.getElementById('swipe-container');

      if(!isAnimating&&commit&&dx<0){
        // Commit: animate home out left, track snaps to idx=1
        isAnimating=true;
        if(homeEl){
          homeEl.style.transition='transform 0.30s cubic-bezier(0.4,0,0.2,1)';
          homeEl.style.transform='translateX(-100%)';
        }
        if(track){
          track.style.transition='transform 0.30s cubic-bezier(0.4,0,0.2,1)';
          track.style.transform=`translateX(${getTrackX(1)}%)`;
        }
        const finish=()=>{
          isAnimating=false;
          if(homeEl){homeEl.style.transition='';homeEl.style.transform='';homeEl.style.display='none';}
          currentTabIndex=1;
          const nextTab=TAB_ORDER_NAV[1];
          TAB_ORDER_NAV.forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===nextTab));
          _syncHeight(1);_watchPanelHeight(1);
          _afterSwitch(nextTab);
        };
        if(track) track.addEventListener('transitionend',finish,{once:true});
        else finish();
        setTimeout(()=>{if(isAnimating)finish();},380);
      } else {
        // Cancel: spring home back, hide track again
        if(homeEl){
          homeEl.style.transition='transform 0.25s cubic-bezier(0.4,0,0.2,1)';
          homeEl.style.transform='translateX(0)';
          homeEl.addEventListener('transitionend',()=>{homeEl.style.transition='';},{once:true});
        }
        if(container) container.style.display='none';
        if(track){track.style.transition='none';track.style.transform=`translateX(${getTrackX(1)}%)`;}
      }
      return;
    }

    if(!dragging){dragging=false;return;}
    dragging=false;
    if(!isHoriz||isAnimating) return;

    if(commit&&dx<0&&currentTabIndex<TAB_ORDER_NAV.length-1){
      const nextIdx=currentTabIndex+1;
      const nextTab=TAB_ORDER_NAV[nextIdx];
      setTrackAnimated(nextIdx,()=>{
        currentTabIndex=nextIdx;
        TAB_ORDER_NAV.forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===nextTab));
        _afterSwitch(nextTab);
      });
    } else if(commit&&dx>0&&currentTabIndex>0){
      const prevIdx=currentTabIndex-1;
      const prevTab=TAB_ORDER_NAV[prevIdx];
      setTrackAnimated(prevIdx,()=>{
        currentTabIndex=prevIdx;
        TAB_ORDER_NAV.forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===prevTab));
        // If going back to idx 0 and dancer has linked profile, show home
        const linked=(currentRole==='dancer'&&currentUser?.uid)?dancers.find(d=>d.linkedUid===currentUser.uid):null;
        if(prevIdx===0&&linked){
          document.getElementById('swipe-container').style.display='none';
          document.getElementById('panel-home').style.display='block';
          renderHomeProfile(linked);
        } else {
          _afterSwitch(prevTab);
        }
      });
    } else {
      setTrackAnimated(currentTabIndex,null);
    }
  },{passive:true});

  // ── Swipe hint ──────────────────────────────────────────────────────────────
  window._showSwipeHint=function(){
    if(window.__swipeHintDone)return;
    window.__swipeHintDone=true;

    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9999;pointer-events:none;background:rgba(0,0,0,0.01)';

    const box=document.createElement('div');
    box.style.cssText=[
      'background:rgba(10,11,13,0.97)',
      'border:2px solid rgba(200,240,110,0.65)',
      'color:#c8f06e',
      'font-size:19px',
      'font-family:"DM Sans",sans-serif',
      'font-weight:500',
      'padding:22px 38px',
      'border-radius:18px',
      'opacity:0',
      'transform:scale(0.82)',
      'transition:opacity 0.28s ease,transform 0.28s ease',
      'text-align:center',
      'white-space:nowrap',
      'box-shadow:0 20px 60px rgba(0,0,0,0.7)',
    ].join(';');
    box.innerHTML='👈 &nbsp; Swipe to switch tabs &nbsp; 👉';

    wrap.appendChild(box);
    document.body.appendChild(wrap);

    // Double rAF ensures transition fires on mobile
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      box.style.opacity='1';
      box.style.transform='scale(1)';
    }));

    setTimeout(()=>{
      box.style.opacity='0';
      box.style.transform='scale(0.88)';
      setTimeout(()=>wrap.remove(),320);
    },2600);
  };
})();
</script>

<div class="ma-overlay hidden" id="ma-overlay" onclick="closeMAModal(event)">
  <div class="ma-modal" onclick="event.stopPropagation()">
    <div class="ma-head">
      <div>
        <div style="font-size:14px;font-weight:500" id="ma-title">Assign recorder</div>
        <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace" id="ma-subtitle"></div>
      </div>
      <button class="popup-close" onclick="closeMAModalDirect()">×</button>
    </div>
    <div class="ma-body" id="ma-body"></div>
    <div class="ma-footer">
      <button class="btn-full" style="background:transparent;border:0.5px solid var(--border2);color:var(--text2)" onclick="closeMAModalDirect()">Cancel</button>
      <button class="btn-full" onclick="saveManualAssign()">Save assignments</button>
    </div>
  </div>
</div>
